# Bluetooth
CONFIG_ZMK_BLE=y
# +8dBm TX power (default 0dBm, +8 is the nRF52840 hardware max). Raises link
# margin/SNR on the ~40cm central<->peripheral split link, which is the weak
# point: symptom was occasional latency + repeated chars (dropped split packets)
# during continuous typing, and moving the halves closer noticeably helped.
# Peak draw is higher only during TX bursts; average battery impact is small.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Disable host-side battery service: macOS treats BAS notifications as HID activity
# and asserts UserIsActive, which prevents the Mac from staying in deep sleep.
# OLED battery widget still works (reads locally).
# Refs:
#   https://github.com/zmkfirmware/zmk/issues/1273
#   https://zmk.dev/docs/config/battery
CONFIG_BT_BAS=n

# Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# RGB Underglow — enabled per-shield in owl_left.conf / owl_right.conf

# CONFIG_ZMK_EXT_POWER is disabled — GPIO 13 default state powers OLED/underglow
CONFIG_ZMK_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Power management
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
